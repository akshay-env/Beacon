services:
  db:
    image: pgvector/pgvector:pg16
    container_name: beacon-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: beacon
      POSTGRES_PASSWORD: beacon
      POSTGRES_DB: beacon
    ports:
      - "5432:5432"
    volumes:
      - beacon_pgdata:/var/lib/postgresql/data

volumes:
  beacon_pgdata:
